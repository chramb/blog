build:
  publish: public
  command: hugo --minify

context:
  production:
    environment:
      HUGO_VERSION: 0.93
      HUGO_ENV: production
      HUGO_ENABLEGITINFO: 'true'
  deploy-preview:
    command: hugo --minify --buildFuture -b $DEPLOY_PRIME_URL
    environment:
      HUGO_VERSION: 0.93

plugins:
  - package: netlify-plugin-hugo-cache-resources
    inputs:
      debug: true
      srcdir: /
